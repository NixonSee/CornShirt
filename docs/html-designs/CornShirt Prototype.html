  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rotate(360deg)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex;flex-direction:column;height:100vh;overflow:hidden;\">\n\n  <!-- ─── DEMO BAR ─── -->\n  <div style=\"background:#0C0C0C;border-bottom:1px solid #272727;padding:7px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:50;\">\n    <span style=\"font-size:10px;color:#555555;text-transform:uppercase;letter-spacing:.12em;font-weight:600;white-space:nowrap;\">Prototype<\u002Fspan>\n    <div style=\"display:flex;gap:3px;\">\n      <button onclick=\"{{ setRolePublic }}\" style=\"padding:4px 13px;border-radius:20px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;letter-spacing:.02em;background:{{ demoPublicBg }};color:{{ demoPublicColor }};transition:all .15s;\">Public<\u002Fbutton>\n      <button onclick=\"{{ setRoleUser }}\" style=\"padding:4px 13px;border-radius:20px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;letter-spacing:.02em;background:{{ demoUserBg }};color:{{ demoUserColor }};transition:all .15s;\">Customer<\u002Fbutton>\n      <button onclick=\"{{ setRoleOrg }}\" style=\"padding:4px 13px;border-radius:20px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;letter-spacing:.02em;background:{{ demoOrgBg }};color:{{ demoOrgColor }};transition:all .15s;\">Organizer<\u002Fbutton>\n      <button onclick=\"{{ setRoleAdmin }}\" style=\"padding:4px 13px;border-radius:20px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;letter-spacing:.02em;background:{{ demoAdminBg }};color:{{ demoAdminColor }};transition:all .15s;\">Admin<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"flex:1;\"><\u002Fdiv>\n    <span style=\"font-size:11px;color:#555555;\">CornShirt <span style=\"color:#FF9000;\">◆<\u002Fspan> NFT Ticketing<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- ─── CONTENT ─── -->\n  <div style=\"flex:1;overflow:hidden;display:flex;\">\n\n    <!-- ════════ PUBLIC VIEW ════════ -->\n    <sc-if value=\"{{ isPublic }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"flex:1;overflow-y:auto;animation:fadeUp .3s ease;\">\n        <!-- Navbar -->\n        <nav style=\"position:sticky;top:0;background:rgba(7,7,14,.97);backdrop-filter:blur(16px);border-bottom:1px solid #272727;padding:0 40px;display:flex;align-items:center;height:62px;gap:20px;z-index:10;\">\n          <div style=\"font-size:19px;font-weight:700;letter-spacing:-.03em;\">Corn<span style=\"color:#FF9000;\">Shirt<\u002Fspan><\u002Fdiv>\n          <div style=\"flex:1;\"><\u002Fdiv>\n          <div style=\"position:relative;\">\n            <svg style=\"position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.35;\" width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><circle cx=\"11\" cy=\"11\" r=\"8\"><\u002Fcircle><path d=\"m21 21-4.35-4.35\"><\u002Fpath><\u002Fsvg>\n            <input placeholder=\"Search events...\" style=\"background:#1A1A1A;border:1px solid #2A2A2A;border-radius:8px;padding:8px 14px 8px 34px;font-size:13px;color:#F0F0F0;width:210px;outline:none;font-family:inherit;\">\n          <\u002Fdiv>\n          <button onclick=\"{{ setRoleUser }}\" style=\"padding:8px 22px;background:#FF9000;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;letter-spacing:.01em;\">Sign In<\u002Fbutton>\n          <button onclick=\"{{ setRoleUser }}\" style=\"padding:8px 18px;background:transparent;color:#BBBBBB;border:1px solid #2A2A2A;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;\">Register<\u002Fbutton>\n        <\u002Fnav>\n\n        <!-- Hero -->\n        <div style=\"padding:56px 40px 32px;max-width:1100px;margin:0 auto;\">\n          <div style=\"font-size:11px;color:#FF9000;font-weight:600;text-transform:uppercase;letter-spacing:.14em;margin-bottom:10px;\">Live Events · Powered by DICKEN Token<\u002Fdiv>\n x;border-bottom:1px solid #272727;\">\n            <div style=\"font-size:16px;font-weight:700;letter-spacing:-.03em;\">Corn<span style=\"color:#FF9000;\">Shirt<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:11px;color:#555555;margin-top:2px;\">{{ roleLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <nav style=\"padding:10px 9px;flex:1;\">\n            <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"5\">\n              <button onclick=\"{{ n.onClick }}\" style=\"display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:{{ n.fw }};font-family:inherit;text-align:left;transition:all .15s;margin-bottom:2px;background:{{ n.bg }};color:{{ n.color }};\">\n                <div style=\"width:3px;height:15px;border-radius:2px;flex-shrink:0;background:{{ n.bar }};\"><\u002Fdiv>\n                {{ n.label }}\n                <sc-if value=\"{{ n.hasBadge }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"margin-left:auto;background:rgba(245,158,11,.18);color:#F59E0B;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700;\">{{ n.badge }}<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fnav>\n\n          <!-- DICKEN balance (user only) -->\n          <sc-if value=\"{{ isUser }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:12px;border-top:1px solid #272727;\">\n              <div style=\"background:linear-gradient(135deg,rgba(245,158,11,.1),rgba(245,158,11,.03));border:1px solid rgba(245,158,11,.18);border-radius:10px;padding:12px;\">\n                <div style=\"font-size:9px;color:#F59E0B;text-transform:uppercase;letter-spacing:.12em;font-weight:600;margin-bottom:3px;\">DICKEN Balance<\u002Fdiv>\n                <div style=\"font-size:22px;font-weight:700;color:#F59E0B;letter-spacing:-.02em;\">◆ {{ balance }}<\u002Fdiv>\n g 15', genre:'Electronic', price:120, supply:500, sold:312, color:'#FF9000', org:'StarPro Events' },\n    { id:2, name:'SONIC BLOOM',     artist:'The Midnight',      venue:'Axiata Arena',          date:'Sep 3',  genre:'Synthwave',  price:80,  supply:1000,sold:678, color:'#2563EB', org:'EventCorp KL'  },\n    { id:3, name:'LUNAR WAVES',     artist:'Lunar Cult',        venue:'PNB Perdana',           date:'Sep 28', genre:'Indie',      price:60,  supply:300, sold:89,  color:'#059669', org:'Moonrise Events'},\n    { id:4, name:'NEON DREAMS',     artist:'Synthwave Kings',   venue:'KLCC Amphitheatre',     date:'Oct 12', genre:'Retrowave',  price:150, supply:200, sold:156, color:'#DC2626', org:'NightLife Co'  },\n  ];\n  PENDING_BASE = [\n    { id:5, name:'DEEP BASS NIGHT',      artist:'Bass Hunters',        venue:'Stadium Putra',    date:'Nov 5, 2026',  org:'EventCorp KL',   submitted:'2 days ago'  },\n    { id:6, name:'STARLIGHT SESSIONS',   artist:'Celestia',            venue:'MITC Melaka',      date:'Nov 20, 2026', org:'StarPro Events', submitted:'5 hours ago' },\n    { id:7, name:'RETRO DISCO NIGHT',    artist:'Disco Funk All Stars', venue:'Hard Rock KL',    date:'Dec 1, 2026',  org:'NightLife Co',   submitted:'1 day ago'   },\n  ];\n  MY_TICKETS = [\n    { event:'AURORA LIVE', type:'General Admission', date:'Aug 15, 2026', tokenId:'#4821', txHash:'0x3f4a…9d2e', grad:'linear-gradient(135deg,#FF9000,#E08000)', init:'AL', canTransfer:true  },\n    { event:'SONIC BLOOM', type:'VIP Pass',          date:'Sep 3, 2026',  tokenId:'#3394', txHash:'0x8c2b…1f7a', grad:'linear-gradient(135deg,#2563EB,#1D4ED8)', init:'SB', canTransfer:false },\n  ];\n  TRANSACTIONS = [\n    { type:'topup',    desc:'DICKEN Top Up',                 amount:'+500',  date:'Jun 20, 2026', hash:'0xa1b2…c3d4' },\n    { type:'purchase', desc:'Ticket: AURORA LIVE (GA)',      amount:'-120',  date:'Jun 22, 2026', hash:'0xe5f6…a7b8' },\n    { type:'purchase', desc:'Ticket: SONIC BLOOM (VIP)',     amount:'-200',  date:'Jun 23, 2026', hash:'0x9c0d…2e3f' },\n    { type:'topup',    desc:'DICKEN Top Up',                 amount:'+1000', date:'Jun 19, 2026', hash:'0x4g5h…6i7j' },\n    { type:'refund',   desc:'Refund: ECLIPSE FESTIVAL',     amount:'+80',   date:'Jun 15, 2026', hash:'0x8k9l…0m1n' },\n  ];\n  ORG_EVENTS = [\n    { name:'AURORA LIVE', artist:'Aurora Nyx', venue:'KL Convention Centre', date:'Aug 15', status:'Active', rev:'37,440', sold:312, supply:500, init:'AL', grad:'linear-gradient(135deg,rgba(255,144,0,.25),rgba(255,144,0,.06))' },\n    { name:'COSMIC JAM',  artist:'Space Boys', venue:'Putrajaya Waterfront',  date:'Dec 10', status:'Pending', rev:'0',      sold:0,   supply:600, init:'CJ', grad:'linear-gradient(135deg,rgba(245,158,11,.18),rgba(245,158,11,.04))' },\n  ];\n  ORGS = [\n    { name:'StarPro Events', email:'hello@starpro.my',   total:4, active:2, joined:'Jan 2026', init:'SP', avBg:'linear-gradient(135deg,#FF9000,#E08000)' },\n    { name:'EventCorp KL',   email:'events@eventcorp.my',total:6, active:3, joined:'Mar 2026', init:'EC', avBg:'linear-gradient(135deg,#2563EB,#1D4ED8)' },\n    { name:'Moonrise Events',email:'info@moonrise.my',   total:2, active:1, joined:'May 2026', init:'MR', avBg:'linear-gradient(135deg,#059669,#047857)' },\n    { name:'NightLife Co',   email:'team@nightlife.my',  total:3, active:2, joined:'Feb 2026', init:'NL', avBg:'linear-gradient(135deg,#DC2626,#B91C1C)' },\n  ];\n  TICKET_TYPES = [\n    { name:'General Admission', price:'80',  supply:'500' },\n    { name:'VIP Pass',          price:'200', supply:'100' },\n  ];\n\n  state = {\n    role:'public', screen:'browse',\n    balance:1250, tuAmount:'500', tuPreset:500,\n    modal:null, toast:null,\n    pendingList:[...this.PENDING_BASE],\n    createStep:0,\n    vInput:'', vResultState:null, // null | 'valid' | 'used' | 'invalid'\n    selTicket:null,\n    activeGenre:'all',\n  };\n\n  _toast(msg, type='success') {\n    this.setState({ toast:{ msg, type } });\n    setTimeout(() => this.setState({ toast:null }), 3200);\n  }\n\n  renderVals() {\n    const S = this.state;\n    const { role, screen, balance, tuAmount, tuPreset, modal, toast,\n            pendingList, createStep, vInput, vResultState, selTicket, activeGenre } = S;\n\n    const isPublic = role==='public';\n    const isUser   = role==='user';\n    const isOrg    = role==='organizer';\n    const isAdmin  = role==='admin';\n    const isAuth   = isUser||isOrg||isAdmin;\n\n    // demo bar\n    const hi='#FF9000', lo='transparent', hc='#fff', lc='#555555';\n    const demoPublicBg=isPublic?hi:lo; const demoPublicColor=isPublic?hc:lc;\n    const demoUserBg  =isUser  ?hi:lo; const demoUserColor  =isUser  ?hc:lc;\n    const demoOrgBg   =isOrg   ?hi:lo; const demoOrgColor   =isOrg   ?hc:lc;\n    const demoAdminBg =isAdmin ?hi:lo; const demoAdminColor =isAdmin ?hc:lc;\n    const setRolePublic=()=>this.setState({role:'public',screen:'browse'});\n    const setRoleUser  =()=>this.setState({role:'user',  screen:'dashboard'});\n    const setRoleOrg   =()=>this.setState({role:'organizer',screen:'dashboard'});\n    const setRoleAdmin =()=>this.setState({role:'admin',screen:'dashboard'});\n\n    // sidebar\n    const roleLabel = isUser?'Customer Account':isOrg?'Organizer Account':isAdmin?'Admin Account':'';\n    const avatarBg  = isUser?'linear-gradient(135deg,#FF9000,#E08000)':isOrg?'linear-gradient(135deg,#F59E0B,#D97706)':'linear-gradient(135deg,#EF4444,#DC2626)';\n    const avatarInit= isUser?'W':isOrg?'O':'A';\n    const userName  = isUser?'Wei Ming':isOrg?'StarPro Events':'Admin';\n    const userEmail = isUser?'weiming@email.com':isOrg?'hello@starpro.my':'admin@cornshirt.com';\n    const firstName = 'Wei Ming';\n    const rmEq = Math.round(balance*0.5);\n\n    const navDef = isUser?[\n      {id:'dashboard',label:'Dashboard'},\n      {id:'browse',   label:'Browse Events'},\n      {id:'tickets',  label:'My Tickets'},\n      {id:'topup',    label:'Top Up DICKEN'},\n      {id:'transactions',label:'Transactions'},\n    ]:isOrg?[\n      {id:'dashboard',label:'Dashboard'},\n      {id:'create',   label:'Create Event'},\n      {id:'verify',   label:'Verify Ticket'},\n    ]:isAdmin?[\n      {id:'dashboard',label:'Dashboard'},\n      {id:'pending',  label:'Pending Events', badge:pendingList.filter(p=>!p.done).length},\n      {id:'events',   label:'All Events'},\n      {id:'organizers',label:'Organizers'},\n    ]:[];\n\n    const navItems = navDef.map(n=>({\n      ...n,\n      onClick:()=>this.setState({screen:n.id}),\n      bg:    screen===n.id?'rgba(255,144,0,.14)':'transparent',\n      color: screen===n.id?'#FF9000':'#888888',\n      fw:    screen===n.id?'600':'500',\n      bar:   screen===n.id?'#FF9000':'transparent',\n      hasBadge:!!n.badge && n.badge>0,\n      badge: n.badge?String(n.badge):'',\n    }));\n\n    const goTopUp  =()=>this.setState({screen:'topup'});\n    const goTickets=()=>this.setState({screen:'tickets'});\n    const goBrowse =()=>this.setState({screen:'browse'});\n    const goCreate =()=>this.setState({screen:'create',createStep:0});\n    const goPending=()=>this.setState({screen:'pending'});\n\n    // screens\n    const uDash  = isUser  && screen==='dashboard';\n    const uBrowse= isUser  && screen==='browse';\n    const uTickets=isUser  && screen==='tickets';\n    const uTopUp = isUser  && screen==='topup';\n    const uTx    = isUser  && screen==='transactions';\n    const oDash  = isOrg   && screen==='dashboard';\n    const oCreate= isOrg   && screen==='create';\n    const oVerify= isOrg   && screen==='verify';\n    const aDash  = isAdmin && screen==='dashboard';\n    const aPending=isAdmin && screen==='pending';\n    const aEvents= isAdmin && screen==='events';\n    const aOrgs  = isAdmin && screen==='organizers';\n\n    // genres\n    const genreOpts=['all','Electronic','Synthwave','Indie','Retrowave'];\n    const genres = genreOpts.map(g=>({\n      label: g==='all'?'All Events':g,\n      onClick:()=>this.setState({activeGenre:g}),\n      border:activeGenre===g?'#FF9000':'#272727',\n      bg:    activeGenre===g?'rgba(255,144,0,.14)':'transparent',\n      color: activeGenre===g?'#FF9000':'#888888',\n    }));\n\n    // event helpers\n    const evCard = (e, onView, onBuy) => ({\n      ...e,\n      grad:`linear-gradient(135deg,${e.color}50,${e.color}1A)`,\n      accent:e.color,\n      pct:`${Math.round(e.sold/e.supply*100)}%`,\n      rem:e.supply-e.sold,\n      init:e.name.split(' ').slice(0,2).map(w=>w[0]).join(''),\n      onView:onView,\n      onBuy: onBuy,\n    });\n\n    const filtered = activeGenre==='all' ? this.EVENTS : this.EVENTS.filter(e=>e.genre===activeGenre);\n    const publicEvents = filtered.map(e=>evCard(e, setRoleUser, null));\n    const allEvents    = this.EVENTS.map(e=>evCard(e, null, ()=>this.setState({modal:{type:'buy',ev:e},selTicket:null})));\n\n    // user dashboard\n    const tktCount  = this.MY_TICKETS.length;\n    const tktActive = tktCount;\n    const upcomingTkts = this.MY_TICKETS.map(t=>({...t}));\n    const myTickets    = this.MY_TICKETS.map(t=>({...t}));\n\n    // transactions\n    const txList = this.TRANSACTIONS.map(tx=>({\n      ...tx,\n      icon:      tx.type==='topup'?'↑':tx.type==='purchase'?'↓':'↺',\n      iconBg:    tx.type==='topup'?'rgba(16,185,129,.1)':tx.type==='purchase'?'rgba(239,68,68,.1)':'rgba(245,158,11,.1)',\n      iconColor: tx.type==='topup'?'#10B981':tx.type==='purchase'?'#EF4444':'#F59E0B',\n      typeBg:    tx.type==='topup'?'rgba(16,185,129,.1)':tx.type==='purchase'?'rgba(239,68,68,.1)':'rgba(245,158,11,.1)',\n      typeColor: tx.type==='topup'?'#10B981':tx.type==='purchase'?'#EF4444':'#F59E0B',\n      typeLabel: tx.type==='topup'?'Top Up':tx.type==='purchase'?'Purchase':'Refund',\n      amtColor:  tx.amount.startsWith('+')?'#10B981':'#EF4444',\n    }));\n\n    // top up presets\n    const presets=[200,500,1000,2000];\n    const tuPresets=presets.map(a=>({\n      amount:a, rm:Math.round(a*0.5),\n      onSelect:()=>this.setState({tuPreset:a,tuAmount:String(a)}),\n      border:tuPreset===a?'rgba(255,144,0,.5)':'#272727',\n      bg:    tuPreset===a?'rgba(255,144,0,.12)':'#0D0D0D',\n      color: tuPreset===a?'#FF9000':'#F0F0F0',\n    }));\n    const onTuInput = e=>this.setState({tuAmount:e.target.value,tuPreset:null});\n    const onTopUp   = ()=>{\n      const a=parseInt(tuAmount)||0;\n      if(a>0){ this.setState({balance:balance+a}); this._toast(`◆ ${a} DICKEN added to wallet!`); }\n    };\n\n    // organizer\n    const orgStats = [\n      {label:'Total Events',  val:'2',          sub:'1 active',          color:'#F0F0F0'},\n      {label:'Tickets Sold',  val:'312',        sub:'this month',        color:'#FF9000'},\n      {label:'Revenue (◆)',   val:'37,440',     sub:'total earned',      color:'#F59E0B'},\n      {label:'Pending',       val:'1',          sub:'awaiting approval', color:'#F59E0B'},\n    ];\n    const orgEvents = this.ORG_EVENTS.map(e=>({\n      ...e,\n      sBg:   e.status==='Active'?'rgba(16,185,129,.1)':'rgba(245,158,11,.1)',\n      sColor:e.status==='Active'?'#10B981':'#F59E0B',\n    }));\n\n    // create event steps\n    const cSteps=[\n      {num:'1',label:'Event Details', arrow:true},\n      {num:'2',label:'Ticket Types',  arrow:false},\n    ].map((s,i)=>({\n      ...s,\n      cBg:    createStep>=i?'#FF9000':'transparent',\n      cBorder:createStep>=i?'none':'1px solid #333333',\n      cColor: createStep>=i?'#fff':'#555555',\n      lColor: createStep>=i?'#F0F0F0':'#555555',\n    }));\n    const cDetails  = createStep===0;\n    const cTickets  = createStep===1;\n    const goTicketStep  = ()=>this.setState({createStep:1});\n    const goDetailsStep = ()=>this.setState({createStep:0});\n    const submitEvent   = ()=>{ this.setState({screen:'dashboard',createStep:0}); this._toast('Event submitted for admin review!'); };\n    const tTypes = this.TICKET_TYPES;\n\n    // verify\n    const vScan   = !vResultState;\n    const vResult = !!vResultState;\n    const vBorder   = vResultState==='valid'?'rgba(16,185,129,.4)':vResultState==='used'?'rgba(245,158,11,.4)':'rgba(239,68,68,.4)';\n    const vIconBg   = vResultState==='valid'?'rgba(16,185,129,.1)':vResultState==='used'?'rgba(245,158,11,.1)':'rgba(239,68,68,.1)';\n    const vIcon     = vResultState==='valid'?'✓':vResultState==='used'?'⊙':'✕';\n    const vColor    = vResultState==='valid'?'#10B981':vResultState==='used'?'#F59E0B':'#EF4444';\n    const vTitle    = vResultState==='valid'?'Valid Ticket':vResultState==='used'?'Already Used':'Invalid Ticket';\n    const vSub      = vResultState==='valid'?'Ticket is valid — ready for entry.':vResultState==='used'?'This ticket has already been scanned.':'Ticket could not be verified.';\n    const vCanMark  = vResultState==='valid';\n    const onVInput  = e=>this.setState({vInput:e.target.value});\n    const onVerify  = ()=>{\n      if(!vInput.trim()) return;\n      const r = vInput.toLowerCase().includes('invalid')?'invalid':vInput.toLowerCase().includes('used')?'used':'valid';\n      this.setState({vResultState:r});\n    };\n    const onMarkUsed = ()=>{ this.setState({vResultState:'used'}); this._toast('Ticket marked as used!'); };\n    const resetVerify= ()=>this.setState({vResultState:null,vInput:''});\n\n    // admin stats\n    const pendingCount = pendingList.filter(p=>!p.done).length;\n    const adminStats=[\n      {label:'Total Events',     val:'7',              sub:'4 active',          color:'#F0F0F0', acBg:'rgba(255,144,0,.07)'},\n      {label:'Pending Review',   val:String(pendingCount), sub:'needs approval',color:'#F59E0B', acBg:'rgba(245,158,11,.07)'},\n      {label:'Organizers',       val:'4',              sub:'registered',        color:'#FF9000', acBg:'rgba(255,144,0,.07)'},\n      {label:'Tickets Sold',     val:'1,235',          sub:'all time',          color:'#10B981', acBg:'rgba(16,185,129,.07)'},\n    ];\n    const pendingBadge = String(pendingCount);\n\n    const mkPend = pe => ({\n      ...pe,\n      init:pe.name.split(' ').slice(0,2).map(w=>w[0]).join(''),\n      grad:'linear-gradient(135deg,rgba(245,158,11,.18),rgba(245,158,11,.04))',\n      onApprove:()=>this.setState({modal:{type:'approve',id:pe.id,name:pe.name}}),\n      onReject: ()=>this.setState({modal:{type:'reject', id:pe.id,name:pe.name}}),\n    });\n    const activePending = pendingList.filter(p=>!p.done);\n    const pendingPreview= activePending.slice(0,2).map(mkPend);\n    const allPending    = activePending.map(mkPend);\n\n    const allEvRows = [\n      ...this.EVENTS.map(e=>({\n        name:e.name, artist:e.artist, org:e.org, date:e.date,\n        sold:e.sold, supply:e.supply,\n        grad:`linear-gradient(135deg,${e.color}44,${e.color}11)`,\n        sBg:'rgba(16,185,129,.1)', sColor:'#10B981', status:'Active',\n      })),\n      ...activePending.map(pe=>({\n        name:pe.name, artist:pe.artist, org:pe.org, date:pe.date,\n        sold:0, supply:500,\n        grad:'linear-gradient(135deg,rgba(245,158,11,.18),rgba(245,158,11,.04))',\n        sBg:'rgba(245,158,11,.1)', sColor:'#F59E0B', status:'Pending',\n      })),\n    ];\n    const orgRows = this.ORGS;\n\n    // modal\n    const showModal = !!modal;\n    const mApprove  = modal&&modal.type==='approve';\n    const mReject   = modal&&modal.type==='reject';\n    const mBuy      = modal&&modal.type==='buy';\n    const mEventName= modal?modal.name||(modal.ev&&modal.ev.name)||'':'';\n    const mArtist   = modal&&modal.ev?modal.ev.artist:'';\n    const mVenue    = modal&&modal.ev?modal.ev.venue:'';\n    const buyTypes  = (modal&&modal.ev)?[\n      { name:'General Admission', price:modal.ev.price,   rem:modal.ev.supply-modal.ev.sold, onSelect:()=>this.setState({selTicket:'ga'}),  border:selTicket==='ga' ?'rgba(255,144,0,.5)':'#272727', bg:selTicket==='ga' ?'rgba(255,144,0,.08)':'transparent' },\n      { name:'VIP Pass',          price:modal.ev.price*2, rem:Math.round((modal.ev.supply-modal.ev.sold)*.1), onSelect:()=>this.setState({selTicket:'vip'}), border:selTicket==='vip'?'rgba(255,144,0,.5)':'#272727', bg:selTicket==='vip'?'rgba(255,144,0,.08)':'transparent' },\n    ]:[];\n    const closeModal    = ()=>this.setState({modal:null,selTicket:null});\n    const stopProp      = e=>e.stopPropagation();\n    const confirmApprove= ()=>{\n      const id=modal.id;\n      this.setState(s=>({ modal:null, pendingList:s.pendingList.map(p=>p.id===id?{...p,done:true}:p) }));\n      this._toast('Event approved — now live for customers!');\n    };\n    const confirmReject = ()=>{\n      const id=modal.id;\n      this.setState(s=>({ modal:null, pendingList:s.pendingList.map(p=>p.id===id?{...p,done:true}:p) }));\n      this._toast('Event rejected and returned to draft.','error');\n    };\n    const confirmBuy = ()=>{\n      const price = selTicket==='vip'?(modal.ev.price*2):modal.ev.price;\n      if(balance>=price){\n        this.setState(s=>({modal:null,balance:s.balance-price,selTicket:null}));\n        this._toast('Ticket minted! NFT sent to your wallet.');\n      } else {\n        this.setState({modal:null,selTicket:null});\n        this._toast('Insufficient DICKEN balance.','error');\n      }\n    };\n\n    // toast\n    const showToast    = !!toast;\n    const toastMsg     = toast?toast.msg:'';\n    const toastIcon    = toast?(toast.type==='success'?'✓':toast.type==='error'?'✕':'ℹ'):'';\n    const toastIconColor=toast?(toast.type==='success'?'#10B981':toast.type==='error'?'#EF4444':'#FF9000'):'';\n    const toastBorder  = toast?(toast.type==='success'?'rgba(16,185,129,.3)':toast.type==='error'?'rgba(239,68,68,.3)':'rgba(255,144,0,.3)'):'#272727';\n\n    return {\n      isPublic,isUser,isOrg,isAdmin,isAuth,\n      demoPublicBg,demoPublicColor,demoUserBg,demoUserColor,demoOrgBg,demoOrgColor,demoAdminBg,demoAdminColor,\n      setRolePublic,setRoleUser,setRoleOrg,setRoleAdmin,\n      roleLabel,avatarBg,avatarInit,userName,userEmail,firstName,\n      balance,rmEq,navItems,\n      goTopUp,goTickets,goBrowse,goCreate,goPending,\n      uDash,uBrowse,uTickets,uTopUp,uTx,\n      oDash,o
